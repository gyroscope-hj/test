<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1번 vs 2번 제스처 선택</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm/vision_bundle.js" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f5f7fb;
            color: #333;
        }
        #container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            margin-bottom: 10px;
            font-size: 2.5rem;
            color: #4a5568;
        }
        p {
            font-size: 1.2rem;
            color: #718096;
            margin-bottom: 20px;
            height: 30px; /* 텍스트 변경 시 레이아웃 흔들림 방지 */
        }
        #video-container {
            position: relative;
            width: 640px;
            height: 480px;
            background: #edf2f7;
            border-radius: 12px;
            overflow: hidden;
        }
        video {
            width: 100%;
            height: 100%;
            transform: rotateY(180deg); /* 거울 모드 */
            object-fit: cover;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
            color: #4a5568;
        }
    </style>
</head>
<body>


<div id="container">
    <h1 id="title">1번 vs 2번</h1>
    <p id="instruction">손으로 1번(☝️) 또는 2번(✌️)을 표시해 주십시오</p>


    <div id="video-container">
        <div id="loading" class="loading">AI 모델 로딩 중... 잠시만 기다려주세요.</div>
        <video id="webcam" autoplay playsinline></video>
    </div>
</div>


<script type="module">
    import { GestureRecognizer, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm/vision_bundle.js";


    const video = document.getElementById("webcam");
    const instructionText = document.getElementById("instruction");
    const loadingText = document.getElementById("loading");
    
    let gestureRecognizer;
    let webcamRunning = false;
    let lastVideoTime = -1;


    // 기본 안내 메시지 저장
    const defaultText = "손으로 1번(☝️) 또는 2번(✌️)을 표시해 주십시오";


    // 1. MediaPipe Gesture Recognizer 초기화
    async function initGestureRecognizer() {
        const vision = await FilesetResolver.forVisionTasks(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm"
        );
        
        gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
            baseOptions: {
                modelAssetPath: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
                delegate: "GPU"
            },
            runningMode: "VIDEO"
        });
        
        loadingText.style.display = "none";
        startWebcam();
    }


    // 2. 웹캠 시작
    function startWebcam() {
        navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } })
        .then((stream) => {
            video.srcObject = stream;
            video.addEventListener("loadeddata", predictWebcam);
        })
        .catch((err) => {
            console.error("웹캠을 연동할 수 없습니다:", err);
            loadingText.innerText = "웹캠을 찾을 수 없거나 권한이 거부되었습니다.";
        });
    }


    // 3. 실시간 제스처 인식 및 텍스트 변경 루프
    async function predictWebcam() {
        if (video.currentTime !== lastVideoTime) {
            lastVideoTime = video.currentTime;
            
            // 이미지 프레임 예측
            const nowInMs = Date.now();
            const results = gestureRecognizer.recognizeForVideo(video, nowInMs);


            // 제스처 결과 처리
            if (results.gestures && results.gestures.length > 0) {
                // 가장 신뢰도가 높은 첫 번째 손의 제스처 추출
                const topGesture = results.gestures[0][0].categoryName;
                
                // 제스처 종류에 따른 분기 처리
                if (topGesture === "Pointing_Up") {
                    instructionText.innerText = "당신은 1번을 좋아하시는군요!";
                    instructionText.style.color = "#3182ce"; // 파란색 강조
                    instructionText.style.fontWeight = "bold";
                } else if (topGesture === "Victory") {
                    instructionText.innerText = "당신은 2번을 좋아하시는군요!";
                    instructionText.style.color = "#e53e3e"; // 빨간색 강조
                    instructionText.style.fontWeight = "bold";
                } else {
                    // 손은 인식되었으나 다른 동작일 때 기본값으로 되돌림
                    resetInstruction();
                }
            } else {
                // 화면에 손이 전혀 인식되지 않을 때 기본값으로 되돌림
                resetInstruction();
            }
        }
        
        // 브라우저의 다음 프레임에 맞춰 반복 실행
        window.requestAnimationFrame(predictWebcam);
    }


    // 안내 문구 초기화 함수
    function resetInstruction() {
        instructionText.innerText = defaultText;
        instructionText.style.color = "#718096";
        instructionText.style.fontWeight = "normal";
    }


    // 페이지 로드 시 실행
    initGestureRecognizer();
</script>


</body>
</html>
